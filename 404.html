<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>404 - ページが見つかりません | KKLab</title>
    <meta name="description" content="ページが見つかりません - KKLab">
    <meta name="robots" content="noindex">

    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/imgs/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/imgs/apple-touch-icon.png">
    <style>
        .error-wrap {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 20px;
        }
        .error-code {
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 800;
            line-height: 1;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-wrap h1 { font-size: 1.6rem; margin: 12px 0; }
        .error-wrap p { color: var(--muted); max-width: 460px; margin: 0 auto 28px; }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="error-wrap">
        <div>
            <div class="error-code">404</div>
            <h1>ページが見つかりません</h1>
            <p>
                お探しのページは存在しないか、移動または削除された可能性があります。
                URL をご確認いただくか、ホームからお探しください。
            </p>
            <a href="/" class="btn btn-primary">ホームに戻る</a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
